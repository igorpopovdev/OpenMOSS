# OpenMOSS — шаблон конфигурации
# Скопируйте этот файл как config.yaml и измените настройки

# Название проекта
project:
  name: "OpenMOSS"

# Конфигурация администратора
admin:
  password: "admin123" # После первого запуска автоматически заменяется на MD5-хеш

# Регистрация агентов
agent:
  registration_token: "openclaw-register-2024" # Токен автоматической регистрации агентов
  allow_registration: true # Включить саморегистрацию агентов (false=только через админку)

# Версия CLI (для автообновления task-cli.py — увеличивайте после обновления)
cli:
  version: 1

# Каналы уведомлений (OpenMOSS отправляет события, агенты получают через GET /config/notification)
notification:
  enabled: false
  # Каналы: тип:ID
  channels: []
    # - "chat:oc_1f99abbba2bf0f8733377893d976ffa5"   # Групповой чат (добавьте агента в чат и упомяните его один раз)
    # - "user:ou_xxxxxxxxxxxxxxxxxxxxxxxxxxxx"        # Личные сообщения (open_id)
  # Типы событий для уведомлений
  events:
    - task_completed    # Подзадача завершена
    - review_rejected    # Рецензия отклонена (доработка)
    - all_done          # Все подзадачи выполнены
    - patrol_alert      # Патруль обнаружил аномалию

# Конфигурация сервера
server:
  port: 6565
  host: "0.0.0.0"
  external_url: ""  # Внешний URL (для агентов), напр. https://moss.example.com

# Конфигурация базы данных
database:
  type: sqlite
  path: "./data/tasks.db"

# Рабочая директория
workspace:
  root: "/home/user/workspace"

# Конфигурация WebUI
webui:
  public_feed: false # Публичный доступ к ленте активности (true=без авторизации)
  feed_retention_days: 7 # Срок хранения логов (дни)

# Метка инициализации (устанавливается мастером настройки — не изменяйте вручную)
setup:
  initialized: false
